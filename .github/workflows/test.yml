name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Native WebSocket runtimes
  # ============================================================

  deno:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test -A mod.test.ts

  node:
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - node-version: 22
            node-flags: "--experimental-strip-types"
          - node-version: 24
            node-flags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: node ${{ matrix.node-flags }} --test mod.test.ts

  bun:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x
      - run: bun test --timeout 30000 mod.test.ts

  # ============================================================
  # WebSocket libraries (custom constructor)
  # ============================================================

  ws:
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: echo '{"type":"module"}' > package.json && npm install ws tsx
      - run: node --import tsx --test mod.test.ts
        env:
          WS_LIB: ws

  undici:
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - node-version: 18
            undici-version: 6
          - node-version: 20
            undici-version: 7
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: echo '{"type":"module"}' > package.json && npm install undici@${{ matrix.undici-version }} tsx
      - run: node --import tsx --test mod.test.ts
        env:
          WS_LIB: undici
          WS_EXPORT: WebSocket
